# Build the dualscreen debug APK on every push and PR (no signing secrets required).
name: Android build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle wrapper
        run: chmod +x gradlew

      # Gradle / AGP still expect ANDROID_HOME on many setups; setup-android sets ANDROID_SDK_ROOT.
      - name: Assemble dualscreen debug
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: ./gradlew :app:assembleDualscreenDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yuyan-dualscreen-debug-apk
          path: app/build/outputs/apk/dualscreen/debug/*.apk
          if-no-files-found: error
